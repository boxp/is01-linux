            build/phase3/initramfs/SHA256SUMS
            build/phase3/initramfs/phase3-init
            build/phase3/initramfs/initramfs.cpio
            build/phase3/mainline-boot/SHA256SUMS
            build/phase3/mainline-boot/VERIFY-SHA256SUMS
            build/phase3/mainline-boot/qcom-qsd8x50-is01.dtb
            build/phase3/mainline-boot/zImage-dtb
