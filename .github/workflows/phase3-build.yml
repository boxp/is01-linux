name: Phase 3 build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  phase3:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host packages
        run: |
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=30 update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=30 install -y build-essential bc bison flex libssl-dev libelf-dev cpio file python3 git ca-certificates wget xz-utils device-tree-compiler gcc-arm-linux-gnueabi mtd-utils

      - name: Verify Phase 3 mainline inputs
        run: make phase3-mainline-config-verify

      - name: Verify Phase 3 downstream board audit
        run: make phase3-downstream-board-audit-verify

      - name: Fetch mainline Linux
        run: make phase3-mainline-fetch

      - name: Build Phase 3 initramfs
        run: make phase3-initramfs

      - name: Verify Phase 3 initramfs
        run: make phase3-initramfs-verify

      - name: Build Phase 3 mainline boot payload
        run: make phase3-mainline-boot

      - name: Verify Phase 3 mainline boot payload
        run: make phase3-mainline-boot-verify

      - name: Build Phase 3 recovery candidate
        run: make phase3-mainline-recovery

      - name: Build Phase 3 boot-entry probe candidates
        run: make phase3-mainline-boot-entry-probes

      - name: Verify Phase 3 boot-entry probe candidates
        run: make phase3-mainline-boot-entry-probes-verify

      - name: Build Phase 3 lean mainline boot payload
        run: make phase3-mainline-lean-boot

      - name: Verify Phase 3 lean mainline boot payload
        run: make phase3-mainline-lean-boot-verify

      - name: Build Phase 3 lean recovery candidate
        run: make phase3-mainline-lean-recovery

      - name: Build Phase 3 DT handoff recovery candidates
        run: make phase3-mainline-dt-handoff-variants

      - name: Verify Phase 3 DT handoff recovery candidates
        run: make phase3-mainline-dt-handoff-variants-verify

      - name: Build Phase 3 ATAG/DTB placement recovery candidates
        run: make phase3-mainline-atag-dtb-placement-probes

      - name: Verify Phase 3 ATAG/DTB placement recovery candidates
        run: make phase3-mainline-atag-dtb-placement-probes-verify

      - name: Upload Phase 3 mainline boot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: is01-phase3-mainline-minimal-boot
          path: |
            build/phase3/initramfs/SHA256SUMS
            build/phase3/initramfs/phase3-init
            build/phase3/initramfs/initramfs.cpio
            build/phase3/mainline-boot/SHA256SUMS
            build/phase3/mainline-boot/VERIFY-SHA256SUMS
            build/phase3/mainline-boot/qcom-qsd8x50-is01.dtb
            build/phase3/mainline-boot/zImage-dtb
            build/phase3/mainline-boot/phase3-mainline-minimal-boot.img
            build/phase3/recovery/SHA256SUMS
            build/phase3/recovery/phase3-mainline-minimal-recovery.img
            build/phase3/boot-entry-probes/SHA256SUMS
            build/phase3/boot-entry-probes/VERIFY-SHA256SUMS
            build/phase3/boot-entry-probes/*-boot-layout.txt
            build/phase3/boot-entry-probes/*-boot.img
            build/phase3/boot-entry-probes/*-recovery.img
            build/phase3/lean-boot/SHA256SUMS
            build/phase3/lean-boot/VERIFY-SHA256SUMS
            build/phase3/lean-boot/VERIFY-BOOT-LAYOUT.txt
            build/phase3/lean-boot/qcom-qsd8x50-is01.dtb
            build/phase3/lean-boot/zImage-dtb
            build/phase3/lean-boot/phase3-mainline-lean-boot.img
            build/phase3/lean-recovery/SHA256SUMS
            build/phase3/lean-recovery/phase3-mainline-lean-recovery.img
            build/phase3/dt-handoff-variants/SHA256SUMS
            build/phase3/dt-handoff-variants/VERIFY-SHA256SUMS
            build/phase3/dt-handoff-variants/*-boot-layout.txt
            build/phase3/dt-handoff-variants/*.dtb
            build/phase3/dt-handoff-variants/*-zImage-dtb
            build/phase3/dt-handoff-variants/*-boot.img
            build/phase3/dt-handoff-variants/*-recovery.img
            build/phase3/atag-dtb-placement-probes/SHA256SUMS
            build/phase3/atag-dtb-placement-probes/VERIFY-SHA256SUMS
            build/phase3/atag-dtb-placement-probes/*-boot-layout.txt
            build/phase3/atag-dtb-placement-probes/*-boot.img
            build/phase3/atag-dtb-placement-probes/*-recovery.img
