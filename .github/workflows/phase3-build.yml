name: Phase 3 build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      build_scope:
        description: Phase 3 artifact scope
        required: true
        default: active
        type: choice
        options:
          - active
          - full

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  phase3:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host packages
        run: |
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=30 update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=30 install -y build-essential bc bison flex libssl-dev libelf-dev cpio file python3 git ca-certificates wget xz-utils device-tree-compiler gcc-arm-linux-gnueabi mtd-utils

      - name: Verify Phase 3 mainline inputs
        run: make phase3-mainline-config-verify

      - name: Verify Phase 3 downstream board audit
        run: make phase3-downstream-board-audit-verify

      - name: Fetch mainline Linux
        run: make phase3-mainline-fetch

      - name: Build Phase 3 initramfs
        run: make phase3-initramfs

      - name: Verify Phase 3 initramfs
        run: make phase3-initramfs-verify

      - name: Build Phase 3 mainline boot payload
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-boot

      - name: Verify Phase 3 mainline boot payload
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-boot-verify

      - name: Build Phase 3 recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-recovery

      - name: Build Phase 3 boot-entry probe candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-boot-entry-probes

      - name: Verify Phase 3 boot-entry probe candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-boot-entry-probes-verify

      - name: Build Phase 3 lean mainline boot payload
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-lean-boot

      - name: Verify Phase 3 lean mainline boot payload
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-lean-boot-verify

      - name: Build Phase 3 lean recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-lean-recovery

      - name: Build Phase 3 DT handoff recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-dt-handoff-variants

      - name: Verify Phase 3 DT handoff recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-dt-handoff-variants-verify

      - name: Build Phase 3 ATAG/DTB placement recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-atag-dtb-placement-probes

      - name: Verify Phase 3 ATAG/DTB placement recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mainline-atag-dtb-placement-probes-verify

      - name: Build Phase 3 non-Linux early payload recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-early-payload-probes

      - name: Verify Phase 3 non-Linux early payload recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-early-payload-probes-verify

      - name: Build Phase 3 Image/zImage-shaped early signal recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-early-signal-probes

      - name: Verify Phase 3 Image/zImage-shaped early signal recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-early-signal-probes-verify

      - name: Build Phase 3 display-independent early signal recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-display-independent-probes

      - name: Verify Phase 3 display-independent early signal recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-display-independent-probes-verify

      - name: Build Phase 3 stock-header kernel-swap recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-stock-header-kernel-swap-probes

      - name: Verify Phase 3 stock-header kernel-swap recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-stock-header-kernel-swap-probes-verify

      - name: Build Phase 3 stock-header Linux entry recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-stock-header-linux-entry

      - name: Verify Phase 3 stock-header Linux entry recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-stock-header-linux-entry-verify

      - name: Build Phase 3 stock-header DTB handoff recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-stock-header-dtb-handoff

      - name: Verify Phase 3 stock-header DTB handoff recovery candidates
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-stock-header-dtb-handoff-verify

      - name: Build Phase 3 decompressor entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-decompressor-entry-reset

      - name: Verify Phase 3 decompressor entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-decompressor-entry-reset-verify

      - name: Build Phase 3 pre-decompress_kernel reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-decompressor-pre-kernel-reset

      - name: Verify Phase 3 pre-decompress_kernel reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-decompressor-pre-kernel-reset-verify

      - name: Build Phase 3 post-decompress_kernel reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-decompressor-post-kernel-reset

      - name: Verify Phase 3 post-decompress_kernel reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-decompressor-post-kernel-reset-verify

      - name: Build Phase 3 pre-__enter_kernel reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-decompressor-pre-enter-kernel-reset

      - name: Verify Phase 3 pre-__enter_kernel reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-decompressor-pre-enter-kernel-reset-verify

      - name: Build Phase 3 __enter_kernel reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-enter-kernel-reset

      - name: Verify Phase 3 __enter_kernel reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-enter-kernel-reset-verify

      - name: Build Phase 3 decompressed image entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-decompressed-image-entry-reset

      - name: Verify Phase 3 decompressed image entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-decompressed-image-entry-reset-verify

      - name: Build Phase 3 stext post-processor reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-stext-post-processor-reset

      - name: Verify Phase 3 stext post-processor reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-stext-post-processor-reset-verify

      - name: Build Phase 3 post-__vet_atags reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-post-vet-atags-reset

      - name: Verify Phase 3 post-__vet_atags reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-post-vet-atags-reset-verify

      - name: Build Phase 3 post-__create_page_tables reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-post-page-tables-reset

      - name: Verify Phase 3 post-__create_page_tables reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-post-page-tables-reset-verify

      - name: Build Phase 3 pre-__enable_mmu reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-pre-enable-mmu-reset

      - name: Verify Phase 3 pre-__enable_mmu reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-pre-enable-mmu-reset-verify

      - name: Build Phase 3 __enable_mmu entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-enable-mmu-entry-reset

      - name: Verify Phase 3 __enable_mmu entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-enable-mmu-entry-reset-verify

      - name: Build Phase 3 pre-__turn_mmu_on reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-pre-turn-mmu-on-reset

      - name: Verify Phase 3 pre-__turn_mmu_on reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-pre-turn-mmu-on-reset-verify

      - name: Build Phase 3 __turn_mmu_on entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-turn-mmu-on-entry-reset

      - name: Verify Phase 3 __turn_mmu_on entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-turn-mmu-on-entry-reset-verify

      - name: Build Phase 3 __mmap_switched entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mmap-switched-entry-reset

      - name: Verify Phase 3 __mmap_switched entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-mmap-switched-entry-reset-verify

      - name: Build Phase 3 start_kernel entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-start-kernel-entry-reset

      - name: Verify Phase 3 start_kernel entry reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-start-kernel-entry-reset-verify

      - name: Build Phase 3 pre-setup_arch reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-pre-setup-arch-reset

      - name: Verify Phase 3 pre-setup_arch reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-pre-setup-arch-reset-verify

      - name: Build Phase 3 post-setup_arch reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-post-setup-arch-reset

      - name: Verify Phase 3 post-setup_arch reset recovery candidate
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        run: make phase3-post-setup-arch-reset-verify

      - name: Build Phase 3 stock-slot no-reset boot recovery candidate
        run: make phase3-stockslot-no-reset-boot

      - name: Verify Phase 3 stock-slot no-reset boot recovery candidate
        run: make phase3-stockslot-no-reset-boot-verify

      - name: Upload Phase 3 mainline boot artifacts
        if: github.event_name == 'workflow_dispatch' && inputs.build_scope == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: is01-phase3-mainline-minimal-boot
